name: BakeSheet
options:
  bundleIdPrefix: com.shimondeitel.bakelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BakeSheet:
    type: application
    platform: iOS
    sources:
      - path: BakeSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bakelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BakeSheet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BakeSheetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BakeSheetTests
      - path: BakeSheet.storekit
    dependencies:
      - target: BakeSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bakelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BakeSheetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BakeSheetUITests
    dependencies:
      - target: BakeSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bakelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BakeSheet:
    build:
      targets:
        BakeSheet: all
        BakeSheetTests: [test]
        BakeSheetUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BakeSheet.storekit
    test:
      config: Debug
      storeKitConfiguration: BakeSheet.storekit
      targets:
        - BakeSheetTests
        - BakeSheetUITests
    archive:
      config: Release
